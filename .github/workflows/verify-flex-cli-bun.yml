name: Verify flex-cli Bun executable

on:
  pull_request:
    paths:
      - ".bun-version"
      - ".github/workflows/verify-flex-cli-bun.yml"
      - "apps/flex-cli/**"
      - "pnpm-lock.yaml"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - ".bun-version"
      - ".github/workflows/verify-flex-cli-bun.yml"
      - "apps/flex-cli/**"
      - "pnpm-lock.yaml"
      - "package.json"

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            outfile: flex-ax-linux-x64
            smoke: ./flex-ax-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            outfile: flex-ax-darwin-arm64
            smoke: ./flex-ax-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            outfile: flex-ax-windows-x64.exe
            smoke: ./flex-ax-windows-x64.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - run: pnpm install --frozen-lockfile --filter ./apps/flex-cli...

      - name: Build executable
        run: |
          mkdir -p artifacts
          bun build --compile --target=${{ matrix.target }} ./apps/flex-cli/src/cli.ts --outfile ./artifacts/${{ matrix.outfile }}

      - name: Smoke test executable
        run: |
          ${{ matrix.smoke }} --version
          ${{ matrix.smoke }} status
        working-directory: artifacts

      - name: Smoke test import + query (regression for #41)
        shell: bash
        working-directory: artifacts
        run: |
          mkdir -p sample/instances sample/templates sample/attendance
          echo '{"startedAt":"2024-01-01T00:00:00Z","durationMs":0}' > sample/crawl-report.json
          OUTPUT_DIR=sample ${{ matrix.smoke }} import
          test -f sample/flex-ax.db
          OUTPUT_DIR=sample ${{ matrix.smoke }} query "SELECT count(*) AS n FROM templates"
